# Nginx Configuration — Distributed System dengan Failover
# Kelompok 5 | RPL-A Scalable System Design
#
# Arsitektur:
#   Client (Browser)
#       ↓
#   Nginx (port 443/80) — load balancer
#       ├── Primary  → localhost:3000  (web-sekolah)
#       └── Backup   → localhost:3001  (web-sekolah-backup) ← aktif HANYA jika primary down
#
# Kedua instance terhubung ke MySQL database yang sama (db_sekolah_ssd)
#
# Cara deploy:
#   sudo cp nginx-distributed.conf /etc/nginx/sites-available/web-sekolah
#   sudo ln -sf /etc/nginx/sites-available/web-sekolah /etc/nginx/sites-enabled/web-sekolah
#   sudo nginx -t && sudo systemctl reload nginx

# ─── Upstream: Primary + Backup ──────────────────────────────────────────────
upstream web_sekolah_cluster {
    # Primary server — digunakan selama aktif
    server localhost:3000;

    # Backup server — HANYA diaktifkan jika primary (port 3000) tidak merespons
    # Direktif "backup" = server ini TIDAK akan menerima request kecuali semua
    # non-backup server tidak tersedia (crash / timeout / error)
    server localhost:3001 backup;

    # Keepalive connections untuk efisiensi
    keepalive 32;
}

# ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name web-sekolah.duckdns.org;
    return 301 https://$host$request_uri;
}

# ─── HTTPS Main Server Block ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name web-sekolah.duckdns.org;

    # SSL Certificate (dari Certbot Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/web-sekolah.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web-sekolah.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── Proxy ke Node.js Cluster ────────────────────────────────────────────
    location / {
        proxy_pass         http://web_sekolah_cluster;
        proxy_http_version 1.1;

        # Headers untuk WebSocket & keepalive
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout — jika primary tidak merespons dalam 5 detik, coba backup
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Aktifkan failover ke backup jika primary error
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ─── Status endpoint untuk monitoring ────────────────────────────────────
    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}
